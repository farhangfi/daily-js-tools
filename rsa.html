<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-8 max-w-7xl w-full">
        <!-- STAGE 1: GENERATE -->
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full text-center border border-gray-100 space-y-4
        animate__animated animate__backInDown md:col-span-5">
            <h2 class="text-xl font-bold">ساخت جفت‌کلید</h2>
            <p class="text-muted text-sm mb-6" text-align: center">یک کلید عمومی (برای قفل‌کردن) و یک کلید خصوصی (برای بازکردن) با الگوریتم RSA-OAEP ۲۰۴۸ بیتی می‌سازد.</p>

            
            <div class="space-y-3">
                <div id="genBtn" class="max-w-sm w-full py-3 bg-blue-600 text-white rounded-md font-medium text-base cursor-pointer hover:bg-blue-800 transition-colors">
                    <span id="genLabel">ساخت کلید تازه</span>
                </div>
            </div>
            

            <div id="keyOutputs" class="hidden grid md:grid-cols-2 gap-5 mt-6">
                <div>
                    <div class="flex items-center justify-between mb-2">
                    <label class="text-sm font-semibold text-verdigris-bright">کلید عمومی (Public Key)</label>
                    <div class="flex gap-2">
                        <button data-copy="publicKeyArea" class="copy-btn text-xs text-muted hover:text-parchment border border-ink-700 rounded px-2 py-1">کپی</button>
                        <button data-download="publicKeyArea" data-filename="public_key.pem" class="dl-btn text-xs text-muted hover:text-parchment border border-ink-700 rounded px-2 py-1">دانلود</button>
                    </div>
                    </div>
                    <textarea id="publicKeyArea" readonly class="font-mono-data text-xs w-full h-40 bg-ink-950 border border-ink-800 rounded-lg p-3 text-parchment resize-none"></textarea>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-2">
                    <label class="text-sm font-semibold text-danger">کلید خصوصی (Private Key)</label>
                    <div class="flex gap-2">
                        <button data-copy="privateKeyArea" class="copy-btn text-xs text-muted hover:text-parchment border border-ink-700 rounded px-2 py-1">کپی</button>
                        <button data-download="privateKeyArea" data-filename="private_key.pem" class="dl-btn text-xs text-muted hover:text-parchment border border-ink-700 rounded px-2 py-1">دانلود</button>
                    </div>
                    </div>
                    <textarea id="privateKeyArea" readonly class="font-mono-data text-xs w-full h-40 bg-ink-950 border border-ink-800 rounded-lg p-3 text-parchment resize-none"></textarea>
                </div>
            </div>
            <p id="keyWarning" class="hidden text-xs text-danger mt-3">این کلید خصوصی را جایی نگه دار که فقط خودت به آن دسترسی داری. هرکس این کلید را داشته باشد می‌تواند پیام‌های قفل‌شده را باز کند.</p>
        </div>

        <div class="teeth-row justify-center" aria-hidden="true">
            <span style="height:8px"></span><span style="height:18px"></span><span style="height:12px"></span><span style="height:20px"></span><span style="height:10px"></span>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center border border-gray-100 space-y-4
        animate__animated animate__backInDown md:col-span-2">
            <h2 class="text-xl font-black text-gray-800 mb-6 tracking-wide">RSA</h2>
            <input type="number" id="num1" placeholder="First Number"
                class="w-full px-4 py-3 mb-4 border border-gray-200 rounded-xl outline-none transition-all duration-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-center text-lg font-medium">
            <button id="calcBtn" class="w-full py-3 bg-blue-600 text-white rounded-md font-medium text-base cursor-pointer hover:bg-blue-800 transition-colors">
                Result
            </button>

            <div class="space-y-3">
                <div id="result" class="p-4 bg-emerald-50 text-emerald-800 rounded-xl font-bold text-sm transition-all duration-300">
                    See Result
                </div>
            </div>
                
            <div class="space-y-3">
                <div id="stringResult" class="p-4 bg-blue-50 text-blue-800 rounded-xl font-bold text-sm transition-all duration-300">
                    String: -
                </div>
            </div>
        </div>
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full border border-gray-100 space-y-4 
        animate__animated animate__backInRight md:col-span-1">            
            <h2 class="text-xl font-black text-gray-800 mb-6 tracking-wide text-center">Home</h2>  
            
            
            <a href="index.html">
                <button id="calcBtn" class="w-full py-3 bg-blue-600 text-white rounded-md font-medium text-base cursor-pointer hover:bg-blue-800 transition-colors">
                    back
                </button> 
            </a>
       
        </div>  
    </div>
    <script src="rsa.js"></script>
</body>
</html>
