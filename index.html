<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
     <!--
    <link rel="stylesheet" href="style.css">
    -->
    <script src="https://cdn.tailwindcss.com"></script>    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-8 max-w-7xl w-full">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center border border-gray-100 space-y-4
        animate__animated animate__backInDown md:col-span-2">
            <h2 class="text-xl font-black text-gray-800 mb-6 tracking-wide">Sum</h2>
            <input type="number" id="num1" placeholder="First Number"
                class="w-full px-4 py-3 mb-4 border border-gray-200 rounded-xl outline-none transition-all duration-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-center text-lg font-medium">
            <input type="number" id="num2" placeholder="Second Number"
                class="w-full px-4 py-3 mb-6 border border-gray-200 rounded-xl outline-none transition-all duration-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-center text-lg font-medium">
            
            <button id="calcBtn" class="w-full py-3 bg-blue-600 text-white rounded-md font-medium text-base cursor-pointer hover:bg-blue-800 transition-colors">
                Result
            </button>

            <div class="space-y-3">
                <div id="result" class="p-4 bg-emerald-50 text-emerald-800 rounded-xl font-bold text-sm transition-all duration-300">
                    See Result
                </div>
                
                <div id="stringResult" class="p-4 bg-blue-50 text-blue-800 rounded-xl font-bold text-sm transition-all duration-300">
                    String: -
                </div>
            </div>
        </div>
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full border border-gray-100 space-y-4 
        animate__animated animate__backInRight md:col-span-3">            
            <h2 class="text-xl font-black text-gray-800 mb-6 tracking-wide text-center">Daily Todo List</h2>    
            <div class="flex gap-2">
                <input type="text" id="todoInput" placeholder="Add a new task..."
                    class="flex-grow px-4 py-3 border border-gray-200 rounded-xl outline-none transition-all duration-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-sm font-medium">
                <button id="addTodoBtn" class="px-5 py-3 bg-indigo-600 text-white rounded-xl font-medium text-sm hover:bg-indigo-800 transition-colors">
                    Add
                </button>
            </div>

            <ul id="todoList" class="space-y-2 max-h-60 overflow-y-auto pr-1">
            </ul>
        </div>   
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full border border-gray-100 space-y-4 
        animate__animated animate__backInRight  md:col-span-3">
            <div id="show" class="p-4 bg-blue-50 text-blue-800 rounded-xl font-bold text-sm transition-all duration-300">
                String: -
            </div>
        </div>          
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full border border-gray-100 space-y-4 
        animate__animated animate__backInRight md:col-span-2">            
            <h2 class="text-xl font-black text-gray-800 mb-6 tracking-wide text-center">RSA</h2>  
            
            
            <a href="rsa.html">
                <button id="calcBtn" class="w-full py-3 bg-blue-600 text-white rounded-md font-medium text-base cursor-pointer hover:bg-blue-800 transition-colors">
                    Let's Go
                </button> 
            </a>
       
        </div>       
    </div>
    <script src="script.js"></script>
</body>
</html>
